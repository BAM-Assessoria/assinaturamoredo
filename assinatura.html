<script>
function escHtml(s){return s.replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function bind(id, fn){document.getElementById(id).addEventListener("input", fn);}
function update(){
  document.getElementById("s-nome").textContent = document.getElementById("f-nome").value;
  document.getElementById("s-cargo").textContent = document.getElementById("f-cargo").value;
  document.getElementById("s-telefone").textContent = document.getElementById("f-telefone").value;
  document.getElementById("s-email").textContent = document.getElementById("f-email").value;
  var ig = document.getElementById("f-instagram").value.replace(/^@/,"");
  var a = document.getElementById("s-instagram");
  a.textContent = "@" + ig;
  a.href = "https://instagram.com/" + ig;
  document.getElementById("s-endereco").innerHTML = escHtml(document.getElementById("f-endereco1").value) + "<br>" + escHtml(document.getElementById("f-endereco2").value);
}
["f-nome","f-cargo","f-telefone","f-email","f-instagram","f-endereco1","f-endereco2"].forEach(function(id){bind(id, update);});

function downloadPNG(){
  var el = document.getElementById("signature");
  html2canvas(el, {scale:2, backgroundColor:null, useCORS:true}).then(function(canvas){
    var link = document.createElement("a");
    var nome = document.getElementById("f-nome").value.replace(/[^a-z0-9]+/gi,"_").toLowerCase() || "assinatura";
    link.download = "assinatura_" + nome + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}

function copyHTML(){
  var html = document.getElementById("signature").outerHTML;
  navigator.clipboard.writeText(html).then(function(){alert("HTML da assinatura copiado!");}, function(){
    var ta = document.createElement("textarea"); ta.value = html; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); alert("HTML copiado!");
  });
}
</script>
